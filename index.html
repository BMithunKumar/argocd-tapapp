<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tap Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: #a0a0c0; letter-spacing: 2px; text-transform: uppercase; }
    .count { font-size: 8rem; font-weight: 900; color: #ffffff; line-height: 1; margin: 20px 0; transition: transform 0.1s ease; }
    .count.bump { transform: scale(1.2); color: #7c6fff; }
    .tap-btn {
      width: 180px; height: 180px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #7c6fff, #ff6fb0);
      color: white; font-size: 1.4rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 0 40px rgba(124,111,255,0.5);
      transition: transform 0.1s ease; text-transform: uppercase; margin: 20px 0;
    }
    .tap-btn:active { transform: scale(0.93); }
    .reset-btn {
      margin-top: 20px; padding: 10px 30px; border-radius: 20px;
      border: 2px solid #444; background: transparent; color: #888;
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease;
    }
    .reset-btn:hover { border-color: #ff6fb0; color: #ff6fb0; }
    .message { margin-top: 16px; font-size: 1rem; color: #7c6fff; height: 24px; font-style: italic; }
  </style>
</head>
<body>
  <h1>Tap Counter</h1>
  <div class="count" id="count">0</div>
  <button class="tap-btn" onclick="tap()">TAP</button>
  <button class="reset-btn" onclick="reset()">Reset</button>
  <div class="message" id="message"></div>
  <script>
    let count = 0;
    const messages = { 1:"First tap! 🎉", 10:"10 taps! 🔥", 50:"50 taps! 💪", 100:"100 TAPS! 🏆" };
    function tap() {
      count++;
      const el = document.getElementById('count');
      el.textContent = count;
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
      if (messages[count]) {
        document.getElementById('message').textContent = messages[count];
        setTimeout(() => document.getElementById('message').textContent = '', 2000);
      }
    }
    function reset() {
      count = 0;
      document.getElementById('count').textContent = '0';
      document.getElementById('message').textContent = 'Reset! 👋';
      setTimeout(() => document.getElementById('message').textContent = '', 2000);
    }
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); tap(); } });
  </script>
</body>
</html>
